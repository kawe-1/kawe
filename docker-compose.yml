services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kawe-API
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Automatically points your backend to the isolated microservice
      - PARSING_SERVICE_URL=http://docling-service:8080
    volumes:
      - kawe_data:/app/data
    restart: unless-stopped
    depends_on:
      - docling-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  docling-service:
    build:
      context: ./parsing_service
      dockerfile: Dockerfile
    container_name: kawe-docling
    # Running internally on 8080 so it doesn't conflict with your main app port if exposed
    ports:
      - "8080:8080"
    volumes:
      # Caches model weights on your host machine so they don't re-download on every compose up
      - docling_models_cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kawe-frontend
    ports:
      - "4173:4173"
    env_file:
      - .env
    depends_on:
      - app
    restart: unless-stopped

volumes:
  kawe_data:
  docling_models_cache: