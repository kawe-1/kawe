services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kawe-API
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - kawe_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kawe-frontend
    ports:
      - "4173:4173"
    env_file:
      - .env
    depends_on:
      - app
    restart: unless-stopped

volumes:
  kawe_data:
